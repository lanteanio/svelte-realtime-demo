services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/stickynotes
      REDIS_URL: redis://cache:6379
      PORT: "3000"
      ORIGIN: ${ORIGIN:-http://localhost:3000}
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
    depends_on:
      postgres:
        condition: service_healthy
      cache:
        condition: service_healthy
    labels:
      - "traefik.http.services.app.loadbalancer.server.port=3000"
      - "caddy_0=https://svelte-realtime-demo.lantean.io"
      - "caddy_0.reverse_proxy={{upstreams 3000}}"
    restart: unless-stopped
    networks:
      - default
      - coolify

  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: stickynotes
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stickynotes"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  cache:
    image: redis:7-alpine
    command: redis-server --protected-mode no --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

networks:
  coolify:
    external: true
