services:
  app:
    build: .
    network_mode: host
    volumes:
      - certs:/etc/letsencrypt:ro
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:?required}@127.0.0.1:5432/stickynotes
      REDIS_URL: redis://127.0.0.1:6379
      PORT: "443"
      ORIGIN: https://${DOMAIN:?required}
      SSL_CERT: /etc/letsencrypt/live/${DOMAIN}/fullchain.pem
      SSL_KEY: /etc/letsencrypt/live/${DOMAIN}/privkey.pem
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
    deploy:
      replicas: 2

  certbot:
    image: certbot/certbot
    volumes:
      - certs:/etc/letsencrypt
    ports:
      - "80:80"
    entrypoint: sh
    command:
      - -c
      - |
        trap exit TERM
        while :; do
          certbot renew --standalone --preferred-challenges http
          sleep 12h & wait $${!}
        done
    restart: unless-stopped

  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: stickynotes
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stickynotes"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --protected-mode no --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  certs:
  pgdata:
  redisdata:
